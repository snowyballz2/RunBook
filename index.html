<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E0F12" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Turn a Markdown procedure into a calm, sequential, checkable guide. Local-first and offline." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Runbook" />
    <title>Runbook</title>
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("runbook:theme");
          var dark =
            saved === "dark" ||
            (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
